name: "Bump Version & Push"
description: "Gathers commits, increments version, commits, tags, and pushes with PAT"

inputs:
  token:
    description: "GitHub PAT to push changes and trigger workflows"
    required: true

outputs:
  tag:
    description: "Created version tag"
    value: ${{ steps.version-bump.outputs.tag }}
  bump_type:
    description: "Detected semantic version bump type"
    value: ${{ steps.version-bump.outputs.bump_type }}
  release_body:
    description: "Markdown body for the GitHub Release"
    value: ${{ steps.version-bump.outputs.release_body }}

runs:
  using: "composite"
  steps:
    - name: Setup Git config
      shell: bash
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: "Get commit messages"
      id: commits
      shell: bash
      run: |
        git fetch --tags
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        if [ -z "$LAST_TAG" ]; then
          COMMITS=$(git log --pretty=format:"* %s" -n 10)
          RAW_COMMITS=$(git log --format="%s%n%b%n---COMMIT-END---" -n 10)
        else
          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"* %s")
          RAW_COMMITS=$(git log ${LAST_TAG}..HEAD --format="%s%n%b%n---COMMIT-END---")
        fi
        if [ -z "$COMMITS" ] || [ "$COMMITS" = " " ]; then
          COMMITS="* maintenance: minor updates"
          RAW_COMMITS=$'maintenance: minor updates\n---COMMIT-END---'
        fi
        echo "list<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "raw<<EOF" >> $GITHUB_OUTPUT
        echo "$RAW_COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: "Bump version & Tag"
      id: version-bump
      shell: bash
      env:
        COMMIT_LIST: ${{ steps.commits.outputs.list }}
        RAW_COMMIT_LOG: ${{ steps.commits.outputs.raw }}
        ACTOR: ${{ github.actor }}
      run: |
        # 1. Process commit list: append actor to every line except merge commits
        PROCESSED_COMMITS=""
        while IFS= read -r line; do
          if [[ "$line" == "* Merge"* ]]; then
            PROCESSED_COMMITS+="$line"$'\n'
          else
            PROCESSED_COMMITS+="$line, by @${ACTOR}"$'\n'
          fi
        done <<< "$COMMIT_LIST"

        # 2. Detect the highest semantic version bump required by the commit range
        BUMP_TYPE="patch"

        if printf "%s\n" "$RAW_COMMIT_LOG" | grep -Eq '(^[^[:space:]]+(\([^)]+\))?!:)|(BREAKING CHANGE:)'; then
          BUMP_TYPE="major"
        elif printf "%s\n" "$RAW_COMMIT_LOG" | grep -Eq '^feat(\([^)]+\))?:'; then
          BUMP_TYPE="minor"
        fi

        echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT

        # 3. Bump the detected version without creating git commit/tag automatically
        npm version "$BUMP_TYPE" --no-git-tag-version

        # 4. Read the new version
        NEW_V=$(node -p "require('./package.json').version")
        TAG="v$NEW_V"
        echo "tag=$TAG" >> $GITHUB_OUTPUT

        # 4b. Sync workspace package versions
        npm version "$NEW_V" --no-git-tag-version --workspaces

        # 5. Stage versioned files
        git add package.json package-lock.json
        npm query .workspace | grep '"location":' | cut -d '"' -f 4 | while read -r loc; do
          git add "$loc/package.json"
        done

        # 6. Create commit message using the processed list
        printf "ci: %s version bump to %s [skip ci]\n\nChanges:\n\n%s\n" "$BUMP_TYPE" "$TAG" "$PROCESSED_COMMITS" > .commit_msg
        {
          echo "release_body<<EOF"
          printf "## Changes\n\n%s\n" "$PROCESSED_COMMITS"
          echo "EOF"
        } >> $GITHUB_OUTPUT

        # 7. Commit and tag
        git commit -F .commit_msg
        git tag -a "$TAG" -F .commit_msg

    - name: "Push changes & tag"
      shell: bash
      run: |
        TAG=${{ steps.version-bump.outputs.tag }}
        git remote set-url origin https://x-access-token:${{ inputs.token }}@github.com/${{ github.repository }}.git
        git push origin "${{ github.ref_name }}"
        git push origin "$TAG"
