name: 'Node & NPM Setup'
description: 'Sets up Node 24 and installs dependencies with npm ci'

runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'

    - name: Install dependencies
      shell: bash
      run: npm ci
