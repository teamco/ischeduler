name: Publish to NPM

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------
  # 1. BUILD & PUBLISH (Matrix)
  # ---------------------------------------------------------
  publish:
    name: 'Build & Publish ${{ matrix.package }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [core, antd, mui, shadcn]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Build ${{ matrix.package }}
        working-directory: packages/${{ matrix.package }}
        run: npm run build

      - name: Publish @teamco/ischeduler-${{ matrix.package }}
        working-directory: packages/${{ matrix.package }}
        run: npm publish --provenance --access public
