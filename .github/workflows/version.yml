name: 'Bump Version'

on:
  push:
    branches:
      - 'main'

jobs:
  bump-version:
    name: 'Bump Version on main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 'Checkout source code'
        uses: 'actions/checkout@v6'
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Setup Git config'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: 'Get commit messages'
        id: commits
        run: |
          git fetch --tags
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"* %s" -n 10)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"* %s")
          fi
          if [ -z "$COMMITS" ] || [ "$COMMITS" = " " ]; then
            COMMITS="* maintenance: minor updates"
          fi
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 'Bump version'
        id: version-bump
        env:
          COMMIT_LIST: ${{ steps.commits.outputs.list }}
          ACTOR: ${{ github.actor }}
        run: |
          # 1. Process commit list: append actor to every line except merge commits
          PROCESSED_COMMITS=""
          while IFS= read -r line; do
            if [[ "$line" == "* Merge"* ]]; then
              # Leave merge commits unchanged
              PROCESSED_COMMITS+="$line"$'\n'
            else
              # Append ", by @ACTOR" to other commits (including the fallback)
              PROCESSED_COMMITS+="$line, by @${ACTOR}"$'\n'
            fi
          done <<< "$COMMIT_LIST"

          # 2. Bump patch version immediately
          npm version patch --no-git-tag-version

          # 3. Read the new version
          NEW_V=$(node -p "require('./package.json').version")
          TAG="v$NEW_V"
          echo "newTag=$TAG" >> $GITHUB_OUTPUT

          # 4. Stage both package.json and package-lock.json
          git add package.json package-lock.json

          # 5. Create commit message using the processed list – no trailing actor line
          cat > .commit_msg <<EOF
          ci: version bump to ${TAG} [skip ci]

          Changes:
          ${PROCESSED_COMMITS}
          EOF

          # 6. Commit and tag
          git commit -F .commit_msg
          git tag -a "$TAG" -F .commit_msg

          # 7. Push
          git push origin main
          git push origin "$TAG"

      - name: 'Output new tag'
        run: echo "new tag ${{ steps.version-bump.outputs.newTag }}"
